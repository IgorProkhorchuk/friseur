<div id="message" xmlns:th="http://www.w3.org/1999/xhtml">

    <p th:text="${message}"></p>
</div>
<!-- UX hint for users after booking; JS below keeps the countdown and redirect in sync -->
<p id="countdown">Redirecting in <span id="seconds">3</span> seconds...</p>
<!-- Simple client-side countdown that navigates to the dashboard without requiring another server round-trip -->
<script>
    let seconds = 3;
    const countdownElem = document.getElementById('seconds');
    const interval = setInterval(function() {
        seconds--;
        countdownElem.textContent = seconds;
        if (seconds <= 0) {
            clearInterval(interval);
            window.location.href = "/user/appointments/dashboard";
        }
    }, 1000);
</script>
